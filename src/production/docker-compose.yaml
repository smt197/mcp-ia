services:
  app:
    container_name: ${APP_NAME:-laravel-boost}
    image: ghcr.io/${GHCR_OWNER}/${GHCR_IMAGE}:latest
    pull_policy: always
    restart: unless-stopped
    networks:
      - app-network
    environment:
      APP_NAME: '${APP_NAME:-laravel-boost}'
      APP_ENV: '${APP_ENV:-production}'
      APP_DEBUG: '${APP_DEBUG:-false}'
      APP_KEY: '${APP_KEY}'
      APP_URL: '${APP_URL}'
      PHP_OPCACHE_ENABLE: '${PHP_OPCACHE_ENABLE:-1}'
      LOG_CHANNEL: '${LOG_CHANNEL:-stack}'
      LOG_LEVEL: '${LOG_LEVEL:-error}'
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge
